    </linearGradient>
  </defs>
  <!-- polygon shape -->
  <polygon points="256,80 420,180 380,350 180,390 100,230" fill="rgba(78,204,160,0.18)" stroke="#4ecca0" stroke-width="14" stroke-linejoin="round"/>
  <!-- dots -->
  <circle cx="256" cy="80" r="16" fill="#7c6fff"/>
  <circle cx="420" cy="180" r="16" fill="#7c6fff"/>
  <circle cx="380" cy="350" r="16" fill="#7c6fff"/>
  <circle cx="180" cy="390" r="16" fill="#7c6fff"/>
  <circle cx="100" cy="230" r="16" fill="#7c6fff"/>
  <!-- ruler tick -->
  <text x="256" y="470" text-anchor="middle" font-family="monospace" font-size="52" font-weight="bold" fill="#7c6fff" opacity="0.7">m²</text>
