      () => { const a=r(200,900),b=r(100,a-100); return {q:`${a} － ${b} ＝ ?`,a:`${a-b}`,w:wrong3(a-b,100,800)} },
      () => { const b=r(2,9),a=r(2,9); return {q:`${a*b} ÷ ${b} ＝ ?`,a:`${a}`,w:wrong3(a,1,9)} },
      () => { const a=r(11,25),b=r(2,4); return {q:`${a} × ${b} ＝ ?`,a:`${a*b}`,w:wrong3(a*b,10,100)} },
    ];
    return ops[r(0,ops.length-1)]();
  }
  if (grade === 4) {
    const ops = [
      () => { const a=r(12,30),b=r(11,20); return {q:`${a} × ${b} ＝ ?`,a:`${a*b}`,w:wrong3(a*b,100,600)} },
      () => { const b=r(11,15),a=b*r(2,8); return {q:`${a} ÷ ${b} ＝ ?`,a:`${a/b}`,w:wrong3(a/b,1,10)} },
      () => { const n=r(1,9),d=r(2,8); return {q:`${n}/${d} ＋ ${n}/${d} ＝ ?`,a:`${2*n}/${d}`,w:[`${n}/${d}`,`${3*n}/${d}`,`${n}/${d*2}`]} },
      () => { const a=r(1,9),b=r(1,9); return {q:`${a}.${b} × 10 ＝ ?`,a:`${a*10+b}`,w:wrong3(a*10+b,10,99)} },
    ];
    return ops[r(0,ops.length-1)]();
  }
  if (grade === 5) {
    const ops = [
      () => { const base=r(4,12)*2,h=r(3,10); return {q:`底辺${base}cm 高さ${h}cm の三角形の面積は？`,a:`${base*h/2}cm²`,w:[`${base*h}cm²`,`${base*h/4}cm²`,`${(base+h)*2}cm²`]} },
      () => { const w=r(4,12),h=r(3,10); return {q:`縦${h}cm 横${w}cm の長方形の面積は？`,a:`${w*h}cm²`,w:[`${w+h}cm²`,`${(w+h)*2}cm²`,`${w*h+10}cm²`]} },
      () => { const n=r(1,8)*10,p=r(1,4)*10; return {q:`${n} の ${p}% は？`,a:`${n*p/100}`,w:wrong3(n*p/100,1,n)} },
    ];
    return ops[r(0,ops.length-1)]();
  }
  if (grade === 6) {
    const ops = [
      () => { const rad=r(2,8); const area=(rad*rad*3.14).toFixed(2); return {q:`半径${rad}cm の円の面積（π≒3.14）は？`,a:`${area}cm²`,w:[`${(rad*2*3.14).toFixed(2)}cm²`,`${(rad*rad*3.14*2).toFixed(2)}cm²`,`${(rad*3.14).toFixed(2)}cm²`]} },
      () => { const a=r(2,5),b=r(2,5),c=r(2,5); return {q:`${a}:${b} ＝ ${a*c}:? の?は？`,a:`${b*c}`,w:wrong3(b*c,2,25)} },
      () => { const sp=r(40,80)/10*10,t=r(1,4); return {q:`時速${sp}km で${t}時間走ると？`,a:`${sp*t}km`,w:[`${sp*t+10}km`,`${sp*t-10}km`,`${sp+t}km`]} },
      () => { const x=r(2,5),m=r(2,4),n=r(1,5); return {q:`x＝${x} のとき ${m}x＋${n} は？`,a:`${m*x+n}`,w:wrong3(m*x+n,5,25)} },
    ];
    return ops[r(0,ops.length-1)]();
  }
  return null;
}

function buildQuestions(subjectId, grade) {
  if (subjectId === "math") {
    // 半分はランダム生成、半分は内蔵問題バンク
    const banked = shuffle(BANK.math[grade] || []).slice(0, 2).map(q => ({
      q: q.q, a: q.a,
      choices: shuffle([q.a, ...shuffle(q.w).slice(0,3)]),
    }));
    const generated = [];
    let tries = 0;
    while (generated.length < 3 && tries < 20) {
      tries++;
      const g = genMathQ(grade);
      if (g && !generated.find(x => x.q === g.q)) {
        generated.push({ q: g.q, a: g.a, choices: shuffle([g.a, ...g.w]) });
      }
    }
    return shuffle([...banked, ...generated]).slice(0, 5);
  }
  // 国語・理科はBANKから
  const pool = BANK[subjectId][grade] || [];
  return shuffle(pool).slice(0, 5).map(q => ({
    q: q.q, a: q.a,
    choices: shuffle([q.a, ...shuffle(q.w).slice(0, 3)]),
  }));
}



// ── State ────────────────────────────────────────
const SUBJECTS = [
  {id:"math",    label:"さんすう・数学", emoji:"🔢", color:"#FF6B6B", light:"#FFF5F5"},
  {id:"japanese",label:"こくご・国語",   emoji:"📖", color:"#4ECDC4", light:"#F0FFFD"},
  {id:"science", label:"りか・理科",     emoji:"🔬", color:"#45B7D1", light:"#F0F8FF"},
];
const GRADES = [
  {grade:1,label:"1年生",emoji:"🌱",color:"#98D8C8"},
  {grade:2,label:"2年生",emoji:"🌿",color:"#7BC8A4"},
  {grade:3,label:"3年生",emoji:"🌻",color:"#F6C90E"},
  {grade:4,label:"4年生",emoji:"⚡",color:"#FF9F43"},
  {grade:5,label:"5年生",emoji:"🚀",color:"#A29BFE"},
  {grade:6,label:"6年生",emoji:"👑",color:"#FD79A8"},
];

let state = {
  screen: "grade", // grade | home | quiz | result
  grade: null,
  subject: null,
  questions: [],
  qIndex: 0,
  score: 0,
  selected: null,
  shake: false,
  quizKey: 0,
  scores: {},
  lastScore: {score:0, total:5},
};

// ── Helpers ───────────────────────────────────────
function setState(patch) {
  Object.assign(state, patch);
  render();
}

function showConfetti() {
  const c = document.getElementById("confetti-container");
  c.innerHTML = "";
  const colors = ["#FF6B6B","#4ECDC4","#FFE66D","#A29BFE","#FD79A8","#55EFC4"];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement("div");
    el.className = "confetti-piece";
    const size = 8 + Math.random() * 8;
    el.style.cssText = `width:${size}px;height:${size}px;background:${colors[i%6]};left:${Math.random()*100}%;border-radius:${Math.random()>.5?"50%":"2px"};animation:fall 1.3s ${Math.random()*.5}s ease-in forwards;`;
    c.appendChild(el);
  }
  setTimeout(() => c.innerHTML = "", 2000);
}

function startQuiz(subjectId) {
  const qs = buildQuestions(subjectId, state.grade);
  setState({screen:"quiz", subject:subjectId, questions:qs, qIndex:0, score:0, selected:null});
}

function handleAnswer(choice) {
  if (state.selected !== null) return;
  const currentQ = state.questions[state.qIndex];
  const correct = choice === currentQ.a;
  const newScore = correct ? state.score + 1 : state.score;
  if (correct) showConfetti();
  setState({selected: choice, shake: !correct});
  if (!correct) setTimeout(() => setState({shake: false}), 450);
  setTimeout(() => {
    if (state.qIndex + 1 >= state.questions.length) {
      const key = `${state.grade}-${state.subject}`;
      const scores = {...state.scores, [key]: Math.max(newScore, state.scores[key]||0)};
      setState({screen:"result", scores, lastScore:{score:newScore, total:state.questions.length}});
    } else {
      setState({qIndex: state.qIndex + 1, score: newScore, selected: null});
    }
  }, 1050);
}

// ── Render helpers ────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "class") e.className = v;
    else if (k === "style") e.style.cssText = v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

function div(style, ...children) { return el("div", {style}, ...children); }
function btn(style, onclick, ...children) { return el("button", {style, onClick:onclick}, ...children); }

// ── Screens ───────────────────────────────────────
function renderGrade() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const screen = el("div", {style:"min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;flex-direction:column;align-items:center;padding:36px 20px;"});
  screen.appendChild(div("text-align:center;margin-bottom:32px;",
    div("font-size:60px;margin-bottom:10px;","🎓"),
    el("h1",{style:"color:white;font-size:32px;font-weight:900;letter-spacing:2px;text-shadow:0 3px 12px rgba(0,0,0,.4);"},"まなびランド"),
    div("color:rgba(255,255,255,.7);font-size:15px;margin-top:8px;font-weight:700;","なんねんせい？")
  ));
  const grid = div("display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:380px;");
  GRADES.forEach((g, i) => {
    const card = el("button", {
      class:"hcard",
      style:`background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:2px solid ${g.color}66;border-radius:20px;padding:22px 16px;cursor:pointer;text-align:center;box-shadow:0 4px 20px ${g.color}22;animation:slideUp .4s ${i*.07}s both;`,
      onClick: () => setState({grade:g.grade, screen:"home"})
    });
    card.appendChild(div("font-size:36px;margin-bottom:6px;",g.emoji));
    card.appendChild(div("color:white;font-size:18px;font-weight:900;",g.label));
    const tag = div("margin-top:8px;",
      el("span",{style:`display:inline-block;background:${g.color};color:#111;border-radius:99px;padding:3px 12px;font-size:11px;font-weight:700;`},"スタート！")
    );
    card.appendChild(tag);
    grid.appendChild(card);
  });
  screen.appendChild(grid);
  app.appendChild(screen);
}

function renderHome() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const gradeInfo = GRADES.find(g=>g.grade===state.grade);
  const screen = el("div",{style:"min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2,#f093fb);display:flex;flex-direction:column;align-items:center;padding:36px 20px;"});
  screen.appendChild(div("text-align:center;margin-bottom:20px;",
    div("font-size:52px;","🌟"),
    el("h1",{style:"color:white;font-size:30px;font-weight:900;letter-spacing:2px;text-shadow:0 3px 12px rgba(0,0,0,.25);"},"まなびランド")
  ));
  screen.appendChild(el("button",{
    class:"hbtn",
    style:"background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:99px;padding:8px 20px;color:white;font-size:15px;font-weight:900;cursor:pointer;margin-bottom:28px;backdrop-filter:blur(8px);",
    onClick:()=>setState({screen:"grade"})
  },`${gradeInfo.emoji} ${gradeInfo.label} ▾ かえる`));

  const list = div("display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px;");
  SUBJECTS.forEach((s,i) => {
    const best = state.scores[`${state.grade}-${s.id}`];
    const card = el("button",{
      class:"hcard",
      style:`background:white;border-radius:20px;padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 8px 24px rgba(0,0,0,.12);cursor:pointer;animation:slideUp .45s ${i*.1}s both;width:100%;text-align:left;`,
      onClick:()=>startQuiz(s.id)
    });
    card.appendChild(div(`width:56px;height:56px;border-radius:14px;background:${s.light};display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;border:3px solid ${s.color}33;`,s.emoji));
    const info = div("text-align:left;flex:1;min-width:0;");
    info.appendChild(div("font-size:18px;font-weight:900;color:#222;",s.label));
    info.appendChild(div("font-size:12px;color:#999;margin-top:2px;", best!=null?`さいこうてん: ${best}/5もん`:"まだチャレンジしていないよ"));
    card.appendChild(info);
    card.appendChild(el("span",{style:`background:${s.color};color:white;border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;flex-shrink:0;`},"スタート →"));
    list.appendChild(card);
  });
  screen.appendChild(list);
  screen.appendChild(div("margin-top:24px;background:rgba(255,255,255,.15);border-radius:14px;padding:12px 20px;color:white;font-size:13px;max-width:360px;text-align:center;backdrop-filter:blur(8px);","💡 各かもく30問以上！さんすうは毎回ちがう数字！"));
  app.appendChild(screen);
}

function renderQuiz() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const subj = SUBJECTS.find(s=>s.id===state.subject);
  const gradeInfo = GRADES.find(g=>g.grade===state.grade);
  const currentQ = state.questions[state.qIndex];
  const progress = (state.qIndex / state.questions.length) * 100;

  const screen = el("div",{style:`min-height:100vh;background:${subj.light};display:flex;flex-direction:column;padding:20px;max-width:480px;margin:0 auto;`});

  // top bar
  const topbar = div("display:flex;align-items:center;gap:10px;margin-bottom:16px;");
  topbar.appendChild(el("button",{style:"background:white;border:none;border-radius:10px;padding:7px 12px;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);",onClick:()=>setState({screen:"home"})},"←"));
  const barRight = div("flex:1;");
  const barLabel = div("display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;font-weight:700;color:#666;");
  barLabel.appendChild(el("span",{},[gradeInfo.emoji,gradeInfo.label," ",subj.emoji,subj.label].join("")));
  barLabel.appendChild(el("span",{},`${state.qIndex+1} / ${state.questions.length}`));
  barRight.appendChild(barLabel);
  const progressBar = div("background:#e0e0e0;border-radius:99px;height:9px;overflow:hidden;");
  const progressFill = div(`width:${progress}%;height:100%;background:linear-gradient(90deg,${subj.color},${subj.color}bb);border-radius:99px;transition:width .4s ease;`);
  progressBar.appendChild(progressFill);
  barRight.appendChild(progressBar);
  topbar.appendChild(barRight);
  screen.appendChild(topbar);

  screen.appendChild(div(`text-align:right;font-size:13px;font-weight:700;color:${subj.color};margin-bottom:12px;`,`⭐ ${state.score}てん`));

  // question card
  const qcard = div(`background:white;border-radius:22px;padding:28px 20px;box-shadow:0 8px 28px ${subj.color}30;text-align:center;margin-bottom:20px;border:3px solid ${subj.color}22;`);
  qcard.className = state.shake ? "shake" : "pop";
  qcard.appendChild(div("font-size:36px;margin-bottom:10px;",subj.emoji));
  qcard.appendChild(div("font-size:19px;font-weight:900;color:#222;line-height:1.6;",currentQ.q));
  screen.appendChild(qcard);

  // choices
  const choiceGrid = div("display:grid;grid-template-columns:1fr 1fr;gap:10px;");
  currentQ.choices.forEach((choice, i) => {
    let bg="white", border=`3px solid ${subj.color}44`, color="#333";
    if (state.selected !== null) {
      if (choice === currentQ.a) { bg="#4ECDC4"; color="white"; border="3px solid #4ECDC4"; }
      else if (state.selected === choice) { bg="#FF6B6B"; color="white"; border="3px solid #FF6B6B"; }
    }
    const prefix = state.selected===choice && choice===currentQ.a ? "✅ " : state.selected===choice ? "❌ " : "";
    const b = el("button",{
      class:"hbtn",
      style:`background:${bg};border:${border};border-radius:14px;padding:16px 10px;font-size:16px;font-weight:700;color:${color};box-shadow:0 3px 10px rgba(0,0,0,.07);animation:pop .32s ${i*.06}s both;width:100%;`,
      onClick: state.selected !== null ? null : ()=>handleAnswer(choice)
    }, prefix + choice);
    if (state.selected !== null) b.disabled = true;
    choiceGrid.appendChild(b);
  });
  screen.appendChild(choiceGrid);

  if (state.selected !== null) {
    const correct = state.selected === currentQ.a;
    const msg = div(`margin-top:18px;text-align:center;font-size:19px;font-weight:900;color:${correct?"#4ECDC4":"#FF6B6B"};`, 
      correct ? "🎉 せいかい！" : `😢 ざんねん！こたえは「${currentQ.a}」`);
    msg.className = "pop";
    screen.appendChild(msg);
  }

  app.appendChild(screen);
}

function renderResult() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const subj = SUBJECTS.find(s=>s.id===state.subject);
  const gradeInfo = GRADES.find(g=>g.grade===state.grade);
  const {score, total} = state.lastScore;
  const pct = score/total;
  const stars = pct>=.9?3:pct>=.6?2:1;
  const [icon,msg] = pct>=.9?["🏆","かんぺき！すごい！"]:pct>=.6?["🎊","よくできました！"]:["💪","もういちどがんばろう！"];

  if (pct >= .6) showConfetti();

  const screen = el("div",{style:"min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;text-align:center;"});
  const card = div("background:white;border-radius:28px;padding:44px 32px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);");
  card.className = "pop";
  card.appendChild(div("font-size:60px;margin-bottom:6px;",icon));
  card.appendChild(el("h2",{style:"font-size:26px;font-weight:900;color:#333;margin-bottom:6px;"},msg));
  card.appendChild(div("font-size:14px;color:#888;margin-bottom:18px;",`${gradeInfo.emoji}${gradeInfo.label}｜${subj.emoji}${subj.label}`));
  
  const scoreBox = div("background:#f8f8ff;border-radius:18px;padding:20px;margin-bottom:18px;");
  scoreBox.appendChild(div("font-size:54px;font-weight:900;color:#667eea;line-height:1;",
    score + el("span",{style:"font-size:26px;color:#bbb;"},`/${total}`)
  ));
  scoreBox.appendChild(div("font-size:13px;color:#aaa;margin-top:2px;","もんせいかい"));
  const starsDiv = div("font-size:44px;letter-spacing:4px;margin-top:10px;");
  [1,2,3].forEach(s => {
    const star = el("span",{style:`filter:${s<=stars?"none":"grayscale(1) opacity(.3)"}`},"⭐");
    starsDiv.appendChild(star);
  });
  scoreBox.appendChild(starsDiv);
  card.appendChild(scoreBox);

  const btns = div("display:flex;flex-direction:column;gap:10px;");
  btns.appendChild(el("button",{
    class:"hbtn",
    style:"background:linear-gradient(135deg,#667eea,#764ba2);color:white;border-radius:14px;padding:15px;font-size:16px;font-weight:900;box-shadow:0 6px 18px rgba(102,126,234,.4);width:100%;",
    onClick:()=>startQuiz(state.subject)
  },"🔄 もういちどチャレンジ！"));
  btns.appendChild(el("button",{
    class:"hbtn",
    style:"background:#f0f0f0;color:#555;border-radius:14px;padding:15px;font-size:16px;font-weight:700;width:100%;",
    onClick:()=>setState({screen:"home"})
  },"🏠 もどる"));
  card.appendChild(btns);
  screen.appendChild(card);
  app.appendChild(screen);
}

function render() {
  if (state.screen === "grade") renderGrade();
  else if (state.screen === "home") renderHome();
  else if (state.screen === "quiz") renderQuiz();
  else if (state.screen === "result") renderResult();
}

render();
</script>
