// ── 算数ランダム生成 ──
function genMathQ(grade){
  const r=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
  const w3=(ans,lo,hi)=>{const s=new Set([ans]);let t=0;while(s.size<4&&t++<50)s.add(r(Math.max(lo,ans-10),Math.min(hi,ans+10)));return shuffle([...s]).filter(x=>x!==ans).slice(0,3);};
  if(grade===1){const ops=[()=>{const a=r(1,9),b=r(1,9-a);return{q:a+" ＋ "+b+" ＝ ?",a:""+(a+b),w:w3(a+b,1,10)};},()=>{const a=r(2,10),b=r(1,a-1);return{q:a+" － "+b+" ＝ ?",a:""+(a-b),w:w3(a-b,0,9)};}];return ops[r(0,1)]();}
  if(grade===2){const ops=[()=>{const a=r(10,49),b=r(10,49);return{q:a+" ＋ "+b+" ＝ ?",a:""+(a+b),w:w3(a+b,10,99)};},()=>{const a=r(20,90),b=r(10,a-10);return{q:a+" － "+b+" ＝ ?",a:""+(a-b),w:w3(a-b,1,80)};},()=>{const a=r(2,9),b=r(2,9);return{q:a+" × "+b+" ＝ ?",a:""+(a*b),w:w3(a*b,2,81)};}];return ops[r(0,2)]();}
  if(grade===3){const ops=[()=>{const a=r(100,499),b=r(100,499);return{q:a+" ＋ "+b+" ＝ ?",a:""+(a+b),w:w3(a+b,100,999)};},()=>{const a=r(200,900),b=r(100,a-100);return{q:a+" － "+b+" ＝ ?",a:""+(a-b),w:w3(a-b,100,800)};},()=>{const b=r(2,9),a=r(2,9);return{q:(a*b)+" ÷ "+b+" ＝ ?",a:""+a,w:w3(a,1,9)};},()=>{const a=r(11,25),b=r(2,4);return{q:a+" × "+b+" ＝ ?",a:""+(a*b),w:w3(a*b,10,100)};}];return ops[r(0,3)]();}
  if(grade===4){const ops=[()=>{const a=r(12,30),b=r(11,20);return{q:a+" × "+b+" ＝ ?",a:""+(a*b),w:w3(a*b,100,600)};},()=>{const b=r(11,15),a=b*r(2,8);return{q:a+" ÷ "+b+" ＝ ?",a:""+(a/b),w:w3(a/b,1,10)};},()=>{const a=r(1,9),b=r(1,9);return{q:a+"."+b+" × 10 ＝ ?",a:""+(a*10+b),w:w3(a*10+b,10,99)};}];return ops[r(0,2)]();}
  if(grade===5){const ops=[()=>{const base=r(4,12)*2,h=r(3,10);return{q:"底辺"+base+"cm 高さ"+h+"cm の三角形の面積は？",a:(base*h/2)+"cm²",w:[(base*h)+"cm²",(base*h/4)+"cm²",((base+h)*2)+"cm²"]};},()=>{const w=r(4,12),h=r(3,10);return{q:"縦"+h+"cm 横"+w+"cm の長方形の面積は？",a:(w*h)+"cm²",w:[(w+h)+"cm²",((w+h)*2)+"cm²",(w*h+10)+"cm²"]};},()=>{const n=r(1,8)*10,p=r(1,4)*10;return{q:n+" の "+p+"% は？",a:""+(n*p/100),w:w3(n*p/100,1,n)};}];return ops[r(0,2)]();}
  if(grade===6){const ops=[()=>{const rad=r(2,8);const area=(rad*rad*3.14).toFixed(2);return{q:"半径"+rad+"cm の円の面積（π≒3.14）は？",a:area+"cm²",w:[(rad*2*3.14).toFixed(2)+"cm²",(rad*rad*3.14*2).toFixed(2)+"cm²",(rad*3.14).toFixed(2)+"cm²"]};},()=>{const a=r(2,5),b=r(2,5),c=r(2,5);return{q:a+":"+b+" ＝ "+(a*c)+":? の?は？",a:""+(b*c),w:w3(b*c,2,25)};},()=>{const x=r(2,5),m=r(2,4),n=r(1,5);return{q:"x＝"+x+" のとき "+m+"x＋"+n+" は？",a:""+(m*x+n),w:w3(m*x+n,5,25)};}];return ops[r(0,2)]();}
  return null;
}

function buildQuestions(subjectId, grade){
  if(subjectId==="math"){
    const banked=shuffle(BANK.math[grade]||[]).slice(0,2).map(q=>({q:q.q,a:q.a,choices:shuffle([q.a,...shuffle(q.w).slice(0,3)])}));
    const generated=[];let tries=0;
    while(generated.length<3&&tries<20){tries++;const g=genMathQ(grade);if(g&&!generated.find(x=>x.q===g.q))generated.push({q:g.q,a:g.a,choices:shuffle([g.a,...g.w])});}
    return shuffle([...banked,...generated]).slice(0,5);
  }
  return shuffle(BANK[subjectId][grade]||[]).slice(0,5).map(q=>({q:q.q,a:q.a,choices:shuffle([q.a,...shuffle(q.w).slice(0,3)])}));
}

// ── Render ──
function h(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==="class")e.className=attrs[k];
    else if(k==="style")e.style.cssText=attrs[k];
    else if(k==="onclick")e.onclick=attrs[k];
    else e.setAttribute(k,attrs[k]);
  });
  if(children)children.forEach(function(c){
    if(c==null)return;
    if(typeof c==="string")e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}
function d(style,children){return h("div",{style:style},children);}

        var key=S.grade+"-"+S.subject;

    var hint = HINTS[S.subject] && HINTS[S.subject][S.grade] ? HINTS[S.subject][S.grade] : "ゆっくり問題を読んで、もう一度考えてみよう！";
    setState({selected:choice,shake:true,explanation:hint,loadingExp:false,pendingScore:newScore});
    setTimeout(function(){setState({shake:false});},450);
  }
}

function renderQuiz(){
  var subj=SUBJECTS.find(function(s){return s.id===S.subject;});
  var gi=GRADES.find(function(g){return g.grade===S.grade;});
  var q=S.questions[S.qIndex];
  var prog=(S.qIndex/S.questions.length)*100;
  var hint=HINTS[S.subject]&&HINTS[S.subject][S.grade]?HINTS[S.subject][S.grade]:"ゆっくり問題を読んでもう一度考えてみよう！";

  var wrap=d("min-height:100vh;background:"+subj.light+";display:flex;flex-direction:column;padding:20px;max-width:480px;margin:0 auto;",null);

  // topbar
  var tb=d("display:flex;align-items:center;gap:10px;margin-bottom:16px;",[
    h("button",{style:"background:white;border:none;border-radius:10px;padding:7px 12px;font-size:18px;",onclick:function(){setState({screen:"home"});}},["←"]),
    d("flex:1;",[
      d("display:flex;justify-content:space-between;margin-bottom:5px;font-size:12px;font-weight:700;color:#666;",[gi.emoji+gi.label+" "+subj.emoji+subj.label,(S.qIndex+1)+" / "+S.questions.length]),
      d("background:#e0e0e0;border-radius:99px;height:9px;overflow:hidden;",[
        d("width:"+prog+"%;height:100%;background:"+subj.color+";border-radius:99px;",null)
      ])
    ])
  ]);
  wrap.appendChild(tb);
  wrap.appendChild(d("text-align:right;font-size:13px;font-weight:700;color:"+subj.color+";margin-bottom:12px;",["⭐ "+S.score+"てん"]));

  // question card
  var qcard=d("background:white;border-radius:22px;padding:28px 20px;box-shadow:0 8px 28px "+subj.color+"30;text-align:center;margin-bottom:20px;border:3px solid "+subj.color+"22;",[
    d("font-size:36px;margin-bottom:10px;",[subj.emoji]),
    d("font-size:19px;font-weight:900;color:#222;line-height:1.6;",[q.q])
  ]);
  qcard.className=S.shake?"shake":"pop";
  wrap.appendChild(qcard);

  // choices
  var grid=d("display:grid;grid-template-columns:1fr 1fr;gap:10px;",null);
  q.choices.forEach(function(choice,i){
    var bg="white",border="3px solid "+subj.color+"44",color="#333";
    if(S.selected!==null){
      if(choice===q.a){bg="#4ECDC4";color="white";border="3px solid #4ECDC4";}
      else if(S.selected===choice){bg="#FF6B6B";color="white";border="3px solid #FF6B6B";}
    }
    var label=(S.selected===choice&&choice===q.a?"✅ ":S.selected===choice?"❌ ":"")+choice;
    var btn=h("button",{
      class:"hbtn",
      style:"background:"+bg+";border:"+border+";border-radius:14px;padding:16px 10px;font-size:16px;font-weight:700;color:"+color+";box-shadow:0 3px 10px rgba(0,0,0,.07);width:100%;",
      onclick:S.selected!==null?null:function(c){return function(){handleAnswer(c);};}(choice)
    },[label]);
    if(S.selected!==null)btn.disabled=true;
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);

  // result message + hint
  if(S.selected!==null){
    var correct=S.selected===q.a;
    var msg=d("margin-top:18px;text-align:center;font-size:19px;font-weight:900;color:"+(correct?"#4ECDC4":"#FF6B6B")+";",[
      correct?"🎉 せいかい！":"😢 ざんねん！こたえは「"+q.a+"」"
    ]);
    msg.className="pop";
    wrap.appendChild(msg);

    if(!correct){
      var box=d("margin-top:12px;background:white;border-radius:16px;padding:16px 18px;box-shadow:0 4px 16px rgba(0,0,0,.08);",[
        d("font-size:13px;font-weight:700;color:#764ba2;margin-bottom:8px;",["💡 解き方のヒント"]),
        d("font-size:14px;color:#444;line-height:1.7;margin-bottom:14px;",[hint]),
        h("button",{
          class:"hbtn",
          style:"background:linear-gradient(135deg,#667eea,#764ba2);color:white;border-radius:12px;padding:12px 24px;font-size:15px;font-weight:900;width:100%;",
          onclick:function(){nextQuestion();}
        },["つぎの もんだいへ →"])
      ]);
      box.className="pop";
      wrap.appendChild(box);
    }
  }
  return wrap;
}


function renderResult(){
  var subj=SUBJECTS.find(function(s){return s.id===S.subject;});
  var gi=GRADES.find(function(g){return g.grade===S.grade;});
  var sc=S.lastScore||{score:0,total:5};
  var pct=sc.score/sc.total;
  var stars=pct>=.9?3:pct>=.6?2:1;
  var icon=pct>=.9?"🏆":pct>=.6?"🎊":"💪";
  var msg=pct>=.9?"かんぺき！すごい！":pct>=.6?"よくできました！":"もういちどがんばろう！";
  if(pct>=.6)showConfetti();

  var starsEl=d("font-size:44px;letter-spacing:4px;margin-top:10px;",null);
  [1,2,3].forEach(function(s){
    starsEl.appendChild(h("span",{style:"filter:"+(s<=stars?"none":"grayscale(1) opacity(.3)")},["⭐"]));
  });

  var scoreNum=d("font-size:54px;font-weight:900;color:#667eea;line-height:1;",null);
  scoreNum.appendChild(document.createTextNode(sc.score));
  scoreNum.appendChild(h("span",{style:"font-size:26px;color:#bbb;"},[ "/"+sc.total]));

  var card=d("background:white;border-radius:28px;padding:44px 32px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);",[
    d("font-size:60px;margin-bottom:6px;",[icon]),
    h("h2",{style:"font-size:26px;font-weight:900;color:#333;margin-bottom:6px;"},[msg]),
    d("font-size:14px;color:#888;margin-bottom:18px;",[gi.emoji+gi.label+"｜"+subj.emoji+subj.label]),
    d("background:#f8f8ff;border-radius:18px;padding:20px;margin-bottom:18px;",[
      scoreNum,
      d("font-size:13px;color:#aaa;margin-top:2px;",["もんせいかい"]),
      starsEl
    ]),
    d("display:flex;flex-direction:column;gap:10px;",[
      h("button",{class:"hbtn",style:"background:linear-gradient(135deg,#667eea,#764ba2);color:white;border-radius:14px;padding:15px;font-size:16px;font-weight:900;box-shadow:0 6px 18px rgba(102,126,234,.4);width:100%;",onclick:function(){startQuiz(S.subject);}},["🔄 もういちどチャレンジ！"]),
      h("button",{class:"hbtn",style:"background:#f0f0f0;color:#555;border-radius:14px;padding:15px;font-size:16px;font-weight:700;width:100%;",onclick:function(){setState({screen:"home"});}},["🏠 もどる"])
    ])
  ]);
  card.className="pop";

  return d("min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;",[card]);
}

render();
</script>
</body>
</html>
